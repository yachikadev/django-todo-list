<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Todo App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    header { padding: 28px 32px; border-bottom: 1px solid #eee; }
    h1 { font-size: 28px; font-weight: 600; }
    .subtitle { color: #888; font-size: 14px; margin-top: 4px; }
    .add-form { display: flex; gap: 8px; padding: 20px 32px; border-bottom: 1px solid #f3f3f3; }
    .todo-input {
      flex: 1; padding: 12px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; outline: none;
    }
    .todo-input:focus { border-color: #667eea; }
    .btn {
      padding: 12px 18px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5568d3; }
    .btn-icon {
      background: transparent; color: #c33; padding: 6px 10px;
    }
    .btn-icon:hover { background: #fee; }
    ul { list-style: none; }
    li {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 32px; border-bottom: 1px solid #f3f3f3;
    }
    li:last-child { border-bottom: none; }
    li.done .title { text-decoration: line-through; color: #aaa; }
    .toggle { display: inline-flex; }
    .toggle input { width: 18px; height: 18px; cursor: pointer; }
    .title { flex: 1; font-size: 15px; }
    .empty { padding: 40px; text-align: center; color: #aaa; }
    footer {
      padding: 16px 32px; font-size: 13px; color: #888;
      background: #fafafa; text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
